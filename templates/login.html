{% extends "base.html" %}

{% block title %}
Login - College Admission Portal
{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg p-4 login-card">

<h2 class="text-center mb-4">
🎓 Student Login
</h2>


<form method="POST">


<div class="mb-3">

<label class="form-label">
Email
</label>

<input 
type="email" 
class="form-control"
name="email"
placeholder="Enter email"
required>

</div>



<div class="mb-3">

<label class="form-label">
Password
</label>

<input 
type="password"
class="form-control"
name="password"
placeholder="Enter password"
required>

</div>



<button class="btn btn-primary w-100">
Login
</button>


</form>


<p class="text-center mt-3">

New Student?

<a href="/register">
Create Account
</a>

</p>


</div>

</div>

</div>

</div>


{% endblock %}
