<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#f4f7fc;
}

.sidebar{
width:250px;
height:100vh;
position:fixed;
background:#0d6efd;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-top:10px;
border-radius:8px;
}

.sidebar a:hover{
background:white;
color:#0d6efd;
}

.content{
margin-left:270px;
padding:30px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>🎓 Nova AI</h3>

<hr>

<a href="#"><i class="fa fa-gauge"></i> Dashboard</a>

<a href="#"><i class="fa fa-users"></i> Users</a>

<a href="#"><i class="fa fa-school"></i> Colleges</a>

<a href="#"><i class="fa fa-chart-column"></i> Reports</a>

<a href="/logout"><i class="fa fa-right-from-bracket"></i> Logout</a>

</div>


<div class="content">

<h2>
Welcome Admin 👋
</h2>

<p class="text-muted">
Manage your Admission AI System
</p>

<div class="row mt-4">

<div class="col-md-6">

<div class="card p-4">

<h5>Total Users</h5>

<h1 class="text-primary">
{{ total_users }}
</h1>

</div>

</div>

<div class="col-md-6">

<div class="card p-4">

<h5>Total Admins</h5>

<h1 class="text-danger">
{{ total_admins }}
</h1>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-3">

<a href="/add_college" class="btn btn-success w-100 p-3">
    ➕ Add College
</a>

</div>

<div class="col-md-3">

<a href="#" class="btn btn-warning w-100 p-3">

👥 View Users

</a>

</div>

<div class="col-md-3">

<a href="#" class="btn btn-info w-100 p-3">

📊 Reports

</a>

</div>

<div class="col-md-3">

<a href="/logout" class="btn btn-danger w-100 p-3">

🚪 Logout

</a>

</div>

</div>

</div>

</body>

</html>
