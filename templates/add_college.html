<!DOCTYPE html>
<html>

<head>

<title>Add College</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="mb-4">
➕ Add College
</h2>

<form method="POST">

<input class="form-control mb-3"
name="college_name"
placeholder="College Name"
required>

<input class="form-control mb-3"
name="location"
placeholder="Location"
required>

<input class="form-control mb-3"
name="course"
placeholder="Course"
required>

<input class="form-control mb-3"
name="cutoff"
placeholder="Cutoff"
required>

<select
class="form-select mb-3"
name="admission_chance">

<option>High</option>

<option>Medium</option>

<option>Good</option>

<option>Low</option>

</select>

<button class="btn btn-success w-100">

Save College

</button>

</form>

</div>

</div>

</body>

</html>
